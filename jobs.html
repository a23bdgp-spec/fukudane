  // 動画セクション（YouTube埋め込み＝外部依存ゼロ原則の唯一の例外・明示許可）
  if (videos.length > 0) {
    html += '<section class="creative-sec"><h2 class="section-title">動画で見る</h2>';
    html += '<div class="video-grid">';
    videos.forEach(function (v) {
      var id = String(v.youtube_id || "").replace(/[^A-Za-z0-9_-]/g, "");
      if (!id) return;
      html += '<div class="video-card">';
      html += '<div class="video-frame"><iframe src="https://www.youtube-nocookie.com/embed/' + id +
        '" title="' + esc(v.title) +
        '" loading="lazy" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>';
      html += '<p class="video-title">' + esc(v.title) + "</p>";
      if (v.channel) html += '<p class="video-channel">' + esc(v.channel) + "</p>";
      html += "</div>";
    });
    html += "</div></section>";
  }

  // 読むセクション（creative_links）
  if (creativeLinks.length > 0) {
    html += '<section class="creative-sec"><h2 class="section-title">読む</h2>';
    html += '<div class="creative-grid">';
    creativeLinks.forEach(function (lk) {
      var url = safeUrl(lk.url);
      html += '<article class="creative-card">';
      if (url) {
        html += '<h3 class="creative-name"><a href="' + esc(url) +
          '" target="_blank" rel="noopener noreferrer">' + esc(lk.name) + "↗</a></h3>";
      } else {
        html += '<h3 class="creative-name">' + esc(lk.name) + "</h3>";
      }
      if (lk["説明"]) html += '<p class="creative-desc">' + esc(lk["説明"]) + "</p>";
      if (lk["運営"]) html += '<p class="creative-by">運営：' + esc(lk["運営"]) + "</p>";
      html += "</article>";
    });
    html += "</div></section>";
  }

  // 資格・職種の一般的な情報（general_links）
  if (generalLinks.length > 0) {
    html += '<section class="creative-sec"><h2 class="section-title">資格・職種の一般的な情報</h2>';
    html += '<p class="section-note">資格や職種の詳しい情報は、各サイトでご確認ください。</p>';
    html += '<ul class="general-links">';
    generalLinks.forEach(function (lk) {
      var url = safeUrl(lk.url);
      if (!url) return;
      html += '<li><a href="' + esc(url) +
        '" target="_blank" rel="noopener noreferrer">' + esc(lk.name) + "↗</a>";
      if (lk["説明"]) html += '<span class="general-desc">' + esc(lk["説明"]) + "</span>";
      if (lk["運営"]) html += '<span class="general-by">運営：' + esc(lk["運営"]) + "</span>";
      html += "</li>";
    });
    html += "</ul></section>";
  }

  if (html === "") {
    html = '<div class="notice"><p class="notice-title">このページは現在準備中です。</p>' +
      "<p>福祉の仕事の現場や創造性が伝わるコンテンツを準備しています。</p></div>";
  }
  rootEl.innerHTML = html;

  /*
    ※16職種カード（JOBS.categories）は現在非表示です。
    データとビルド機構（build_map.py の JOBS 注入）は温存しており、将来この描画を復活できます。
  */

  // HTML特殊文字を無害化
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  // リンク先URLは http/https のみ許可
  function safeUrl(u) {
    var s = String(u == null ? "" : u).trim();
    return /^https?:\/\//i.test(s) ? s : "";
  }
})();
</script>

<script src="nav.js" defer></script>
</body>
</html>
