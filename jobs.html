/* ===== 描画処理（福祉の仕事） ===== */
(function () {
  var descEl = document.getElementById("jobs-desc");
  var navEl = document.getElementById("cat-nav");
  var rootEl = document.getElementById("jobs-root");
  var linksEl = document.getElementById("jobs-links");
  var categories = (JOBS && JOBS.categories) || [];

  // 導入（説明文はJSONのまま）
  if (descEl && JOBS && JOBS.description) descEl.textContent = JOBS.description;

  if (categories.length === 0) {
    rootEl.innerHTML =
      '<div class="notice"><p class="notice-title">このページは現在準備中です。</p>' +
      "<p>福祉分野の主な仕事と資格を、一次情報・公的資料で確認しながら整理しています。</p></div>";
    return;
  }

  // 3分類のページ内ナビ
  navEl.innerHTML = categories
    .map(function (c, i) {
      return '<a class="period-link" href="#cat-' + i + '">' + esc(c.category) + "</a>";
    })
    .join("");

  // 各分類のセクションと職種カード
  rootEl.innerHTML = categories
    .map(function (c, i) {
      var h = '<section class="job-cat" id="cat-' + i + '">';
      h += '<h2 class="period-title">' + esc(c.category) + "</h2>";
      if (c.note) h += '<p class="job-cat-note">' + esc(c.note) + "</p>";
      h += '<div class="job-grid">';
      (c.jobs || []).forEach(function (j) {
        h += '<article class="job-card">';
        h += '<h3 class="job-name">' + esc(j["名称"]) + "</h3>";
        if (j["位置づけ"]) h += '<p class="job-basis">' + esc(j["位置づけ"]) + "</p>";
        h += "<dl class=\"job-dl\">";
        if (j["仕事の内容"]) h += "<dt>仕事の内容</dt><dd>" + esc(j["仕事の内容"]) + "</dd>";
        if (j["なり方"]) h += "<dt>なり方</dt><dd>" + esc(j["なり方"]) + "</dd>";
        h += "</dl>";
        var links = [];
        var url = safeUrl(j["出典URL"]);
        if (url) {
          links.push('<a href="' + esc(url) +
            '" target="_blank" rel="noopener noreferrer">出典を見る↗</a>');
        }
        var ref = safeUrl(j["参考URL"]);
        if (ref) {
          links.push('<a href="' + esc(ref) +
            '" target="_blank" rel="noopener noreferrer">試験・資格の案内↗</a>');
        }
        if (links.length) h += '<p class="job-source">' + links.join("　") + "</p>";
        h += "</article>";
      });
      h += "</div></section>";
      return h;
    })
    .join("");

  // 仕事を知る（外部リンク）：jobs.jsonにリンク集がある場合のみ表示
  renderJobLinks();

  function renderJobLinks() {
    var links = JOBS["リンク集"] || JOBS.links || [];
    if (!linksEl || !links || links.length === 0) return;
    var h = '<h2 class="section-title">仕事を知る</h2>';
    h += '<ul class="job-links-list">';
    links.forEach(function (lk) {
      var url = safeUrl(lk.url || lk.URL || lk["URL"]);
      var name = lk.name || lk["名称"] || lk.title || url;
      if (!url) return;
      h += '<li><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">' + esc(name) + "↗</a>";
      if (lk.desc || lk["説明"]) h += '<span class="job-link-desc">' + esc(lk.desc || lk["説明"]) + "</span>";
      h += "</li>";
    });
    h += "</ul>";
    linksEl.innerHTML = h;
    linksEl.hidden = false;
  }

  // HTML特殊文字を無害化
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  // リンク先URLは http/https のみ許可
  function safeUrl(u) {
    var s = String(u == null ? "" : u).trim();
    return /^https?:\/\//i.test(s) ? s : "";
  }
})();
</script>
