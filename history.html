<!--
  データ埋め込み枠。content/history.json の内容を build_map.py が下の HISTORY に注入する。
  データを更新したら build_map.py を再実行するだけで反映される。file:// でも動作。
  データ形式：{ title, description, periods:[ { period, events:[ { year_西暦, year_和暦, event, tags:[], source_url } ] } ] }
-->
<script>
/* __HISTORY_INJECT_START__ ここから下を build_map.py が content/history.json で置き換える（未注入時は空） */
const HISTORY = {
  "periods": []
};
/* __HISTORY_INJECT_END__ ここまで */

/* ===== 描画処理（年表） ===== */
(function () {
  var descEl = document.getElementById("history-desc");
  var navEl = document.getElementById("period-nav");
  var rootEl = document.getElementById("history-root");
  var periods = (HISTORY && HISTORY.periods) || [];

  // 説明文（JSONのまま）
  if (descEl && HISTORY && HISTORY.description) descEl.textContent = HISTORY.description;

  if (periods.length === 0) {
    rootEl.innerHTML =
      '<div class="notice"><p class="notice-title">このページは現在準備中です。</p>' +
      "<p>制度の歴史を、一次情報・公的資料で確認しながら作成しています。</p></div>";
    return;
  }

  // 時期3分割のページ内ナビ
  navEl.innerHTML = periods
    .map(function (p, i) {
      return '<a class="period-link" href="#period-' + i + '">' + esc(p.period) + "</a>";
    })
    .join("");

  // 各時期のタイムライン
  rootEl.innerHTML = periods
    .map(function (p, i) {
      var h = '<section class="period" id="period-' + i + '">';
      h += '<h2 class="period-title">' + esc(p.period) + "</h2>";
      h += '<ol class="timeline">';
      (p.events || []).forEach(function (ev) {
        h += '<li class="tl-item">';
        h += '<div class="tl-year"><span class="tl-seireki">' + esc(ev["year_西暦"]) + "</span>";
        if (ev["year_和暦"]) h += '<span class="tl-wareki">' + esc(ev["year_和暦"]) + "</span>";
        h += "</div>";
        h += '<div class="tl-body">';
        var tags = ev.tags || [];
        if (tags.length) {
          h += '<div class="tl-tags">';
          tags.forEach(function (t) { h += '<span class="tl-tag">' + esc(t) + "</span>"; });
          h += "</div>";
        }
        h += '<p class="tl-event">' + esc(ev.event) + "</p>";
        var url = safeUrl(ev.source_url);
        if (url) {
          h += '<p class="tl-source"><a href="' + esc(url) +
            '" target="_blank" rel="noopener noreferrer">出典を見る↗</a></p>';
        }
        h += "</div></li>";
      });
      h += "</ol></section>";
      return h;
    })
    .join("");

  // HTML特殊文字を無害化
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  // リンク先URLは http/https のみ許可
  function safeUrl(u) {
    var s = String(u == null ? "" : u).trim();
    return /^https?:\/\//i.test(s) ? s : "";
  }
})();
</script>
