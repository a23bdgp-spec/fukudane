    flat.forEach(function (n) {
      var p = (rel(n.org)["親団体"] || "").replace(/（[^）]*）\s*$/, "").trim();
      if (p) refCount[p] = (refCount[p] || 0) + 1;
    });
    var best = null, bestC = 0;
    Object.keys(refCount).forEach(function (k) { if (refCount[k] > bestC) { bestC = refCount[k]; best = k; } });
    if (best) center = findNode(best);
  }

  // 分類：中心の組織内組織（親団体＝中心）／別母体の関連団体（親団体≠中心）／独立団体
  var children = [], affiliates = [];
  var childIds = {}, affiliateIds = {};
  flat.forEach(function (n) {
    if (n === center) return;
    var p = (rel(n.org)["親団体"] || "").trim();
    if (!p) return;
    var pn = findNode(p);
    if (pn && pn === center) { children.push(n); childIds[n.id] = true; }
    else { affiliates.push({ node: n, parent: pn }); affiliateIds[n.id] = true; }
  });

  // 関係図（系統別一覧の前）
  var dg = '<section class="org-diagram"><h2 class="section-title">関係図</h2>';
  dg += '<p class="section-note">各団体をクリックすると、その団体の詳しい情報に移動します。</p>';
  dg += '<div class="diagram-scroll"><div class="diagram">';
  if (center) {
    dg += '<div class="dg-center-wrap">';
    dg += '<button type="button" class="dg-node dg-node-center" data-target="' + center.id + '">' + esc(label(center.org)) + "</button>";
    if (children.length > 0) {
      dg += '<div class="dg-trunk"></div>';
      dg += '<div class="dg-children"><div class="dg-children-label">' + esc(label(center.org)) + 'の組織内組織</div><div class="dg-children-row">';
      children.forEach(function (n) {
        dg += '<button type="button" class="dg-node" data-target="' + n.id + '">' + esc(label(n.org)) + "</button>";
      });
      dg += "</div></div>";
    }
    dg += "</div>";
  }
  // 独立団体（系統ごとにグループ枠）＝中心・組織内・別母体関連を除く
  dg += '<div class="dg-groups">';
  systems.forEach(function (sys) {
    var members = (sys.orgs || []).map(function (o) { return nameToNode[o["名称"]]; })
      .filter(function (n) { return n && n !== center && !childIds[n.id] && !affiliateIds[n.id]; });
    if (members.length === 0) return;
    dg += '<div class="dg-group"><div class="dg-group-title">' + esc(sys.system) + '</div><div class="dg-group-row">';
    members.forEach(function (n) {
      dg += '<button type="button" class="dg-node" data-target="' + n.id + '">' + esc(label(n.org)) + "</button>";
    });
    dg += "</div></div>";
  });
  dg += "</div>";
  // 別母体をもつ関連団体（政治連盟など）＝母体と点線でつなぐ
  affiliates.forEach(function (a) {
    var pLabel = a.parent ? label(a.parent.org) : (rel(a.node.org)["親団体"] || "").replace(/（[^）]*）\s*$/, "");
    dg += '<div class="dg-affiliate-row">';
    dg += '<button type="button" class="dg-node dg-node-affiliate" data-target="' + a.node.id + '">' + esc(label(a.node.org)) + "</button>";
    dg += '<span class="dg-dash" aria-hidden="true"></span>';
    dg += '<span class="dg-affiliate-note">設立母体：' + esc(pLabel) + "（公表情報）</span>";
    dg += "</div>";
  });
  dg += "</div></div>";
  if (diagramNote) dg += '<p class="diagram-note">' + esc(diagramNote) + "</p>";
  dg += "</section>";
  html += dg;

  // 系統別の団体一覧
  systems.forEach(function (sys) {
    html += '<section class="org-sys">';
    html += '<h2 class="section-title">' + esc(sys.system) + "</h2>";
    html += '<div class="org-grid">';
    (sys.orgs || []).forEach(function (o) {
      var _node = nameToNode[o["名称"]];
      html += '<article class="org-card" id="' + (_node ? _node.id : "") + '">';
      html += '<h3 class="org-name">' + esc(o["名称"]);
      if (o["略称"]) html += '<span class="org-abbr">（' + esc(o["略称"]) + "）</span>";
      html += "</h3>";
      html += "<dl class=\"org-dl\">";
      if (o["設立年"]) html += "<dt>設立年</dt><dd>" + esc(o["設立年"]) + "年</dd>";
      if (o["目的"]) html += "<dt>目的</dt><dd>" + esc(o["目的"]) + "</dd>";
      if (o["会員規模"]) html += "<dt>会員規模</dt><dd>" + esc(o["会員規模"]) + "</dd>";
      if (o["主な活動"]) html += "<dt>主な活動</dt><dd>" + esc(o["主な活動"]) + "</dd>";
      html += "</dl>";
      var links = [];
      var site = safeUrl(o["公式URL"]);
      if (site) links.push('<a href="' + esc(site) + '" target="_blank" rel="noopener noreferrer">公式サイト↗</a>');
      var src = safeUrl(o["出典URL"]);
      if (src) links.push('<a href="' + esc(src) + '" target="_blank" rel="noopener noreferrer">出典↗</a>');
      if (links.length) html += '<p class="org-links">' + links.join("　") + "</p>";
      html += "</article>";
    });
    html += "</div></section>";
  });

  // 政策決定の流れ（policy_process）
  if (policy.length > 0) {
    html += '<section class="org-policy"><h2 class="section-title">政策決定の流れ</h2>';
    html += '<p class="section-note">団体の意見が制度・政策に反映されるまでの一般的な流れです。</p>';
    html += '<ol class="policy-steps">';
    policy.forEach(function (p) {
      html += '<li class="policy-step">';
      html += '<span class="policy-stage">' + esc(p.stage) + "</span>";
      if (p["説明"]) html += '<p class="policy-text">' + esc(p["説明"]) + "</p>";
      var src = safeUrl(p["出典URL"]);
      if (src) html += '<p class="policy-source"><a href="' + esc(src) + '" target="_blank" rel="noopener noreferrer">出典↗</a></p>';
      html += "</li>";
    });
    html += "</ol></section>";
  }

  // 団体の歩み（timeline）
  if (timeline.length > 0) {
    html += '<section class="org-timeline"><h2 class="section-title">団体の歩み</h2>';
    html += '<ol class="timeline">';
    timeline.forEach(function (ev) {
      html += '<li class="tl-item">';
      html += '<div class="tl-year"><span class="tl-seireki">' + esc(ev["year_西暦"]) + "</span>";
      if (ev["year_和暦"]) html += '<span class="tl-wareki">' + esc(ev["year_和暦"]) + "</span>";
      html += "</div><div class=\"tl-body\">";
      html += '<p class="tl-event">' + esc(ev.event) + "</p>";
      var src = safeUrl(ev["出典URL"]);
      if (src) html += '<p class="tl-source"><a href="' + esc(src) + '" target="_blank" rel="noopener noreferrer">出典を見る↗</a></p>';
      html += "</div></li>";
    });
    html += "</ol></section>";
  }

  rootEl.innerHTML = html;

  // 関係図ノードのクリックで該当団体カードへスクロール（軽くハイライト）
  var dgNodes = rootEl.querySelectorAll(".dg-node");
  Array.prototype.forEach.call(dgNodes, function (btn) {
    btn.addEventListener("click", function () {
      var id = btn.getAttribute("data-target");
      var target = id && document.getElementById(id);
      if (!target) return;
      target.scrollIntoView({ behavior: "smooth", block: "start" });
      target.classList.add("org-card-flash");
      setTimeout(function () { target.classList.remove("org-card-flash"); }, 1600);
    });
  });

  // HTML特殊文字を無害化
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  // リンク先URLは http/https のみ許可
  function safeUrl(u) {
    var s = String(u == null ? "" : u).trim();
    return /^https?:\/\//i.test(s) ? s : "";
  }
})();
</script>

<script src="nav.js" defer></script>
</body>
</html>
