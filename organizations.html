/* ===== 描画処理（福祉業界団体） ===== */
(function () {
  var descEl = document.getElementById("orgs-desc");
  var rootEl = document.getElementById("orgs-root");
  var systems = (ORGANIZATIONS && ORGANIZATIONS.systems) || [];
  var policy = (ORGANIZATIONS && ORGANIZATIONS.policy_process) || [];
  var timeline = (ORGANIZATIONS && ORGANIZATIONS.timeline) || [];

  if (descEl && ORGANIZATIONS && ORGANIZATIONS.description) descEl.textContent = ORGANIZATIONS.description;

  if (systems.length === 0) {
    rootEl.innerHTML =
      '<div class="notice"><p class="notice-title">このページは現在準備中です。</p>' +
      "<p>福祉分野の主要な業界団体を、公表情報に基づいて整理しています。</p></div>";
    return;
  }

  var html = "";

  // 系統別の団体一覧
  systems.forEach(function (sys) {
    html += '<section class="org-sys">';
    html += '<h2 class="section-title">' + esc(sys.system) + "</h2>";
    html += '<div class="org-grid">';
    (sys.orgs || []).forEach(function (o) {
      html += '<article class="org-card">';
      html += '<h3 class="org-name">' + esc(o["名称"]);
      if (o["略称"]) html += '<span class="org-abbr">（' + esc(o["略称"]) + "）</span>";
      html += "</h3>";
      html += "<dl class=\"org-dl\">";
      if (o["設立年"]) html += "<dt>設立年</dt><dd>" + esc(o["設立年"]) + "年</dd>";
      if (o["目的"]) html += "<dt>目的</dt><dd>" + esc(o["目的"]) + "</dd>";
      if (o["会員規模"]) html += "<dt>会員規模</dt><dd>" + esc(o["会員規模"]) + "</dd>";
      if (o["主な活動"]) html += "<dt>主な活動</dt><dd>" + esc(o["主な活動"]) + "</dd>";
      html += "</dl>";
      var links = [];
      var site = safeUrl(o["公式URL"]);
      if (site) links.push('<a href="' + esc(site) + '" target="_blank" rel="noopener noreferrer">公式サイト↗</a>');
      var src = safeUrl(o["出典URL"]);
      if (src) links.push('<a href="' + esc(src) + '" target="_blank" rel="noopener noreferrer">出典↗</a>');
      if (links.length) html += '<p class="org-links">' + links.join("　") + "</p>";
      html += "</article>";
    });
    html += "</div></section>";
  });

  // 政策決定の流れ（policy_process）
  if (policy.length > 0) {
    html += '<section class="org-policy"><h2 class="section-title">政策決定の流れ</h2>';
    html += '<p class="section-note">団体の意見が制度・政策に反映されるまでの一般的な流れです。</p>';
    html += '<ol class="policy-steps">';
    policy.forEach(function (p) {
      html += '<li class="policy-step">';
      html += '<span class="policy-stage">' + esc(p.stage) + "</span>";
      if (p["説明"]) html += '<p class="policy-text">' + esc(p["説明"]) + "</p>";
      var src = safeUrl(p["出典URL"]);
      if (src) html += '<p class="policy-source"><a href="' + esc(src) + '" target="_blank" rel="noopener noreferrer">出典↗</a></p>';
      html += "</li>";
    });
    html += "</ol></section>";
  }

  // 団体の歩み（timeline）
  if (timeline.length > 0) {
    html += '<section class="org-timeline"><h2 class="section-title">団体の歩み</h2>';
    html += '<ol class="timeline">';
    timeline.forEach(function (ev) {
      html += '<li class="tl-item">';
      html += '<div class="tl-year"><span class="tl-seireki">' + esc(ev["year_西暦"]) + "</span>";
      if (ev["year_和暦"]) html += '<span class="tl-wareki">' + esc(ev["year_和暦"]) + "</span>";
      html += "</div><div class=\"tl-body\">";
      html += '<p class="tl-event">' + esc(ev.event) + "</p>";
      var src = safeUrl(ev["出典URL"]);
      if (src) html += '<p class="tl-source"><a href="' + esc(src) + '" target="_blank" rel="noopener noreferrer">出典を見る↗</a></p>';
      html += "</div></li>";
    });
    html += "</ol></section>";
  }

  rootEl.innerHTML = html;

  // HTML特殊文字を無害化
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  // リンク先URLは http/https のみ許可
  function safeUrl(u) {
    var s = String(u == null ? "" : u).trim();
    return /^https?:\/\//i.test(s) ? s : "";
  }
})();
