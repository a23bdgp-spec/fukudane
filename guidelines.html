/* ===== 描画処理（ガイドライン集） ===== */
(function () {
  var descEl = document.getElementById("guidelines-desc");
  var tocEl = document.getElementById("guidelines-toc");
  var rootEl = document.getElementById("guidelines-root");
  var cats = (GUIDELINES && GUIDELINES.categories) || [];

  if (descEl && GUIDELINES && GUIDELINES.description) descEl.textContent = GUIDELINES.description;

  if (cats.length === 0) {
    rootEl.innerHTML =
      '<div class="notice"><p class="notice-title">このページは現在準備中です。</p>' +
      "<p>福祉の現場運営に関わるガイドラインを、公表情報に基づいて分野別に整理しています。</p></div>";
    return;
  }

  // 分野の目次（ページ内ジャンプ）
  var toc = "";
  cats.forEach(function (c, i) {
    toc += '<a class="gl-toc-link" href="#gl-cat-' + i + '">' + esc(c.category) + "</a>";
  });
  if (tocEl) tocEl.innerHTML = toc;

  // 分野別一覧
  var html = "";
  cats.forEach(function (c, i) {
    html += '<section class="gl-cat" id="gl-cat-' + i + '">';
    html += '<h2 class="section-title">' + esc(c.category) + "</h2>";
    html += '<div class="gl-grid">';
    (c.items || []).forEach(function (it) {
      html += '<article class="gl-card">';
      html += '<h3 class="gl-name">' + esc(it["名称"]) + "</h3>";
      html += '<dl class="gl-dl">';
      if (it["発行"]) html += "<dt>発行</dt><dd>" + esc(it["発行"]) + "</dd>";
      if (it["年"]) html += "<dt>年</dt><dd>" + esc(it["年"]) + "</dd>";
      if (it["概要"]) html += "<dt>概要</dt><dd>" + esc(it["概要"]) + "</dd>";
      html += "</dl>";
      var url = safeUrl(it["URL"]);
      if (url) html += '<p class="gl-links"><a href="' + esc(url) + '" target="_blank" rel="noopener noreferrer">原文を見る↗</a></p>';
      html += "</article>";
    });
    html += "</div></section>";
  });
  rootEl.innerHTML = html;

  // HTML特殊文字を無害化
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  // リンク先URLは http/https のみ許可
  function safeUrl(u) {
    var s = String(u == null ? "" : u).trim();
    return /^https?:\/\//i.test(s) ? s : "";
  }
})();
</script>
